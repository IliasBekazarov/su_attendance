{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>{{ subject.subject_name }} сабагына катышууну белгилөө</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label for="attendance_date">Датаны тандаңыз:</label>
            <input type="date" class="form-control" id="attendance_date" name="attendance_date" required>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Студенттин аты</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                    <tr>
                        <td>{{ student.name }}</td>
                        <td>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="status_{{ student.id }}" id="present_{{ student.id }}" value="P" checked>
                                <label class="form-check-label" for="present_{{ student.id }}">Катышты</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="status_{{ student.id }}" id="absent_{{ student.id }}" value="A">
                                <label class="form-check-label" for="absent_{{ student.id }}">Жок</label>
                            </div>
                        </td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="2">Бул сабакка катталган студенттер жок.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn btn-success mt-3">Сактоо</button>
    </form>
</div>
{% endblock %}
